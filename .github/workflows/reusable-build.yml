name: Reusable Build

on:
  workflow_call:
    inputs:
      php-version:
        required: true
        type: string
      artifact-name:
        required: true
        type: string

jobs:
  build:
    runs-on: [self-hosted, high-performance, X64, Linux]
    container:
      image: ubuntu:24.04
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    permissions:
      contents: read
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git curl sudo unzip

      - name: setup Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sh get-docker.sh

      - name: Configure Docker group permissions
        run: |
          useradd -m wpuser
          SOCK_GID=$(stat -c '%g' /var/run/docker.sock)
          groupmod -g $SOCK_GID -o docker
          usermod -aG docker wpuser

      - name: Configure environment variables
        run: |
          # Unique variables for wp-env to prevent conflicts on shared self-hosted runners
          UNIQUE_ID=$(cat /proc/sys/kernel/random/uuid | sed 's/-//g')
          echo "COMPOSE_PROJECT_NAME=wpenv_reusable_build_${UNIQUE_ID}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}

      - name: Configure Git for Safe Directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set up PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2.36.0
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@3cf229dc2919194e9e36783941438d17239e8520 # v3.1.1
        with:
          composer-options: '--no-dev --optimize-autoloader'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # - name: modify the permissions
      #   run: chown -R wpuser:wpuser "${GITHUB_WORKSPACE}"

      - name: Build plugin for release
        run: npm run build:prod

      - name: Start the Docker testing environment
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: sudo -u wpuser env "PATH=$PATH" "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME" npm run wp-env start

      - name: Generate Translation files
        run: sudo -u wpuser env "PATH=$PATH" "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME" npm run i18n:make-pot

      - name: Create plugin zip
        run: npm run plugin-zip

      - name: Upload plugin zip artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.artifact-name }}
          path: plugin-skeleton-d.zip
          if-no-files-found: error
